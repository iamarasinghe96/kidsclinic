
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Kids Clinic / Allergy and Asthma Center{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Feather Icons -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.29.0/dist/feather.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('receptionist') }}">
                <i data-feather="heart"></i>
                The Kids Clinic
            </a>
            
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('receptionist') }}">
                    <i data-feather="users"></i> Reception
                </a>
                <a class="nav-link" href="{{ url_for('queue_management') }}">
                    <i data-feather="clock"></i> Queue
                </a>
                <a class="nav-link" href="{{ url_for('consultant') }}">
                    <i data-feather="user-check"></i> Consultant
                </a>
                <a class="nav-link" href="{{ url_for('report') }}">
                    <i data-feather="bar-chart-2"></i> Reports
                </a>
                <a class="nav-link" href="{{ url_for('admin_login') }}">
                    <i data-feather="settings"></i> Admin
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    
    <!-- Initialize Feather Icons -->
    <script>
        feather.replace();
    </script>
</body>
</html>
