{% extends "base.html" %}

{% block title %}Patient Registration - The Kids Clinic{% endblock %}

{% block content %}
<div class="mb-4">
    <h3 class="text-nowrap mb-0">
        <i data-feather="user-plus" class="me-2"></i>Patient Registration
    </h3>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header" style="background-color: #8EC641; color: white;">
                <h5 class="mb-0">
                    <i data-feather="user-plus"></i>
                    Patient Registration
                </h5>
            </div>
            <div class="card-body">
                <ul class="nav nav-tabs" id="registrationTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="new-patient-tab" data-bs-toggle="tab"
                                data-bs-target="#new-patient" type="button" role="tab">
                            <i data-feather="user-plus"></i> New Patient
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="returning-patient-tab" data-bs-toggle="tab"
                                data-bs-target="#returning-patient" type="button" role="tab">
                            <i data-feather="repeat"></i> Returning Patient
                        </button>
                    </li>
                </ul>

                <div class="tab-content mt-3" id="registrationTabContent">
                    <!-- New Patient Registration -->
                    <div class="tab-pane fade show active" id="new-patient" role="tabpanel">
                        <form method="POST" action="{{ url_for('register_patient') }}">
                            <input type="hidden" name="title" id="new_auto_title">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Patient Name *</label>
                                    <input type="text" class="form-control" name="full_name" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Date of Birth (DD/MM/YYYY) *</label>
                                    <input type="text" class="form-control" name="date_of_birth" id="new_dob"
                                           placeholder="DD/MM/YYYY" pattern="\d{2}/\d{2}/\d{4}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Gender *</label>
                                    <select class="form-select" name="gender" id="new_gender" required>
                                        <option value="">Select Gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">Title <small class="text-muted">(auto)</small></label>
                                    <input type="text" class="form-control bg-light fw-bold" id="new_title_display" readonly placeholder="—">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">Parent/Guardian Name</label>
                                    <input type="text" class="form-control" name="parent_name">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Contact Number *</label>
                                    <input type="text" class="form-control" name="contact_number" required>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">Weight (kg)</label>
                                    <input type="number" step="0.1" class="form-control" name="weight_kg" placeholder="e.g., 25.5">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Consultant *</label>
                                    <select class="form-select" name="consultant_id" required>
                                        <option value="">Select Consultant</option>
                                        {% for consultant in consultants %}
                                            <option value="{{ consultant.id }}">{{ consultant.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Address *</label>
                                    <textarea class="form-control" name="address" rows="2" required></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" name="email" placeholder="Optional">
                                </div>
                            </div>
                            <div class="d-grid mt-3">
                                <button type="submit" class="btn btn-primary btn-lg" style="background-color: #8EC641; border-color: #8EC641;">
                                    <i data-feather="user-plus" class="me-2"></i>Register New Patient
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Returning Patient -->
                    <div class="tab-pane fade" id="returning-patient" role="tabpanel">
                        <div class="mb-3">
                            <label for="patientSearch" class="form-label">Search Patient</label>
                            <input type="text" class="form-control" id="patientSearch"
                                   placeholder="Enter patient name, registration number, or contact number">
                        </div>

                        <div id="searchResults" class="mb-3"></div>

                        <div id="returningPatientForm" style="display: none;">
                            <form method="POST" action="{{ url_for('register_returning_patient') }}">
                                <input type="hidden" id="returning_patient_id" name="patient_id">
                                <input type="hidden" id="returning_title" name="title">
                                <input type="hidden" id="returning_gender_hidden" value="">

                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Patient Name</label>
                                        <input type="text" class="form-control" name="full_name" id="returning_full_name" required>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Date of Birth</label>
                                        <input type="text" class="form-control bg-light" id="returning_dob" readonly>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Title <small class="text-muted">(auto)</small></label>
                                        <input type="text" class="form-control bg-light fw-bold" id="returning_title_display" readonly placeholder="—">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Registration No.</label>
                                        <input type="text" class="form-control bg-light" name="registration_number" id="returning_reg_number" readonly>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Contact Number</label>
                                        <input type="text" class="form-control" name="contact_number" id="returning_contact_number">
                                    </div>

                                    <div class="col-md-3">
                                        <label class="form-label">Today's Weight (kg)</label>
                                        <input type="number" step="0.1" class="form-control" name="weight_kg"
                                               id="returning_weight" placeholder="Optional">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Consultant</label>
                                        <select class="form-select" name="consultant_id" id="returning_consultant_id" required>
                                            <option value="">Select Consultant</option>
                                            {% for consultant in consultants %}
                                                <option value="{{ consultant.id }}">{{ consultant.name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>

                                <div class="d-grid gap-2 mt-3">
                                    <button type="submit" class="btn btn-success btn-lg">
                                        <i data-feather="plus-circle" class="me-2"></i>Add to Today's Queue
                                    </button>
                                    <button type="button" class="btn btn-warning btn-lg" onclick="savePatientChanges()">
                                        <i data-feather="save" class="me-2"></i>Save Changes
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Auto-title calculation from DOB + gender
function calculateTitle(dob, gender) {
    if (!dob || !gender) return '';
    const parts = dob.split('/');
    if (parts.length !== 3 || parts[2].length !== 4) return '';
    const birthDate = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
    if (isNaN(birthDate.getTime())) return '';
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
    if (age < 2) return 'Baby';
    if (age < 18) return gender === 'Male' ? 'Master' : 'Miss';
    return gender === 'Male' ? 'Mr.' : 'Mrs.';
}

function updateNewPatientTitle() {
    const dob = document.getElementById('new_dob').value;
    const gender = document.getElementById('new_gender').value;
    const title = calculateTitle(dob, gender);
    document.getElementById('new_auto_title').value = title;
    document.getElementById('new_title_display').value = title;
}

// Date formatting function
function formatDateInput(input) {
    let value = input.value.replace(/\D/g, '');
    if (value.length >= 2) value = value.substring(0, 2) + '/' + value.substring(2);
    if (value.length >= 5) value = value.substring(0, 5) + '/' + value.substring(5, 9);
    input.value = value;
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    const dobInput = document.getElementById('new_dob');
    dobInput.addEventListener('input', function() {
        formatDateInput(this);
        updateNewPatientTitle();
    });
    dobInput.addEventListener('keypress', function(e) {
        if (!/\d/.test(e.key) && !['Backspace', 'Delete', 'Tab', 'Enter'].includes(e.key)) {
            e.preventDefault();
        }
    });
    document.getElementById('new_gender').addEventListener('change', updateNewPatientTitle);
});

// Patient search functionality
let searchTimeout;
document.getElementById('patientSearch').addEventListener('input', function() {
    const query = this.value.trim();
    
    clearTimeout(searchTimeout);
    
    if (query.length < 2) {
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('returningPatientForm').style.display = 'none';
        return;
    }
    
    searchTimeout = setTimeout(() => {
        fetch(`/search_patients?q=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(data => {
                displaySearchResults(data);
            })
            .catch(error => {
                console.error('Error searching patients:', error);
                document.getElementById('searchResults').innerHTML = `
                    <div class="alert alert-danger">Error searching patients</div>
                `;
            });
    }, 300);
});

// Display search results
function displaySearchResults(patients) {
    const resultsDiv = document.getElementById('searchResults');
    
    if (patients.length === 0) {
        resultsDiv.innerHTML = `
            <div class="alert alert-info">No patients found</div>
        `;
        return;
    }
    
    let html = '<div class="list-group">';
    patients.forEach(patient => {
        html += `
            <div class="list-group-item list-group-item-action" onclick="selectReturningPatient(${patient.id})">
                <div class="d-flex w-100 justify-content-between">
                    <h6 class="mb-1">${patient.full_name}</h6>
                    <small>${patient.registration_number}</small>
                </div>
                <p class="mb-1">DOB: ${patient.date_of_birth} | Contact: ${patient.contact_number}</p>
                <small class="text-muted">Consultant: ${patient.consultant_name}</small>
            </div>
        `;
    });
    html += '</div>';
    
    resultsDiv.innerHTML = html;
}

// Select returning patient
function selectReturningPatient(patientId) {
    fetch(`/get_patient_details_by_id/${patientId}`)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                throw new Error(data.error);
            }

            // Auto-calculate title from stored DOB + gender
            const title = calculateTitle(data.date_of_birth_formatted, data.gender);

            document.getElementById('returning_patient_id').value = data.id;
            document.getElementById('returning_title').value = title;
            document.getElementById('returning_title_display').value = title;
            document.getElementById('returning_gender_hidden').value = data.gender;
            document.getElementById('returning_full_name').value = data.full_name;
            document.getElementById('returning_contact_number').value = data.contact_number || '';
            document.getElementById('returning_reg_number').value = data.registration_number;
            document.getElementById('returning_dob').value = data.date_of_birth_formatted;
            document.getElementById('returning_consultant_id').value = data.consultant_id;

            document.getElementById('returningPatientForm').style.display = 'block';
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('returning_weight').focus();
        })
        .catch(error => {
            console.error('Error loading patient details:', error);
            alert('Error loading patient information');
        });
}

// Save patient changes
function savePatientChanges() {
    const patientId = document.getElementById('returning_patient_id').value;
    const title = document.getElementById('returning_title').value;
    const fullName = document.getElementById('returning_full_name').value;
    const contactNumber = document.getElementById('returning_contact_number').value;
    
    if (!patientId || !fullName) {
        alert('Please ensure all required fields are filled');
        return;
    }
    
    const formData = new FormData();
    formData.append('patient_id', patientId);
    formData.append('title', title);
    formData.append('full_name', fullName);
    formData.append('contact_number', contactNumber);
    // Do not send registration_number, visit date, or visit time as they should not be changed
    
    fetch('/update_patient', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showNotification('Patient information updated successfully!', 'success');
            // Clear the form and hide it
            document.getElementById('returningPatientForm').style.display = 'none';
            document.getElementById('patientSearch').value = '';
        } else {
            showNotification('Error updating patient: ' + (data.error || 'Unknown error'), 'error');
        }
    })
    .catch(error => {
        console.error('Error updating patient:', error);
        showNotification('Error updating patient information', 'error');
    });
}

// Show notifications
function showNotification(message, type) {
    const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
    const notification = document.createElement('div');
    notification.className = `alert ${alertClass} alert-dismissible fade show position-fixed`;
    notification.style.cssText = 'top: 20px; right: 20px; z-index: 1050; min-width: 300px;';
    notification.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    document.body.appendChild(notification);
    
    // Auto-dismiss after 3 seconds
    setTimeout(() => {
        if (notification.parentNode) {
            notification.remove();
        }
    }, 3000);
}

// Initialize feather icons
document.addEventListener('DOMContentLoaded', function() {
    feather.replace();
    
    // Handle tab switching
    document.getElementById('new-patient-tab').addEventListener('click', function() {
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('returningPatientForm').style.display = 'none';
        document.getElementById('patientSearch').value = '';
    });
});

// Check for URL parameters (success messages)
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const success = urlParams.get('success');
    const error = urlParams.get('error');
    
    if (success) {
        showNotification(decodeURIComponent(success), 'success');
        
        // If this is a successful patient registration, trigger queue refresh
        if (success.includes('registered successfully') || success.includes('Welcome back')) {
            console.log('[RECEPTIONIST] Triggering queue refresh after patient registration');
            localStorage.setItem('queueRefreshTrigger', Date.now().toString());
        }
    }
    if (error) {
        showNotification(decodeURIComponent(error), 'error');
    }
});
</script>

<style>
.nav-tabs .nav-link {
    color: #6c757d;
}

.nav-tabs .nav-link.active {
    background-color: #8EC641;
    border-color: #8EC641;
    color: white;
}

.list-group-item {
    cursor: pointer;
}

.list-group-item:hover {
    background-color: #f8f9fa;
}

.card-header {
    font-weight: 600;
}
</style>

{% endblock %}
