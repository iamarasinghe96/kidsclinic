<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Kids Clinic / Allergy and Asthma Center{% endblock %}</title>
    
    <!-- Bootstrap CSS with light theme -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    
    <!-- Custom CSS for patient information -->
    <style>
        .patient-details .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 4px 0;
            border-bottom: 1px solid #dee2e6;
        }
        
        .patient-details .info-label {
            font-weight: 600;
            color: #6c757d;
            min-width: 120px;
        }
        
        .patient-details .info-value {
            color: #212529;
            text-align: right;
        }
        
        .patient-item.active {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
        }
        
        .list-group-item:hover {
            background-color: #f8f9fa;
        }
        
        .patient-item {
            transition: all 0.2s ease;
        }
        
        .patient-item:hover {
            background-color: #e9ecef !important;
        }
        
        .card-header h4, .card-header h5 {
            margin: 0;
        }
        
        .badge {
            font-size: 0.875em;
        }
        
        /* Print styles for compact patient info */
        @media print {
            body * {
                visibility: hidden;
            }
            
            .print-content, .print-content * {
                visibility: visible;
            }
            
            .print-content {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
        }
        
        /* Auto-refresh indicator */
        .auto-refresh {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #8EC641;">
        <div class="container">
            <a class="navbar-brand text-white" href="{{ url_for('index') }}">
                <i data-feather="heart"></i>
                The Kids Clinic / Allergy and Asthma Center
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white {% if request.endpoint == 'receptionist' %}fw-bold{% endif %}" 
                           href="{{ url_for('receptionist') }}">
                            <i data-feather="user-plus"></i>
                            Receptionist
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white {% if request.endpoint == 'consultant' %}fw-bold{% endif %}" 
                           href="{{ url_for('consultant') }}">
                            <i data-feather="activity"></i>
                            Consultant
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white {% if request.endpoint == 'report' %}fw-bold{% endif %}" 
                           href="{{ url_for('report') }}">
                            <i data-feather="bar-chart-2"></i>
                            Reports
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Flash Messages -->
    <div class="container mt-3">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <!-- Main Content -->
    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    
    <!-- Initialize Feather Icons -->
    <script>
        feather.replace();
        
        // Auto-dismiss registration success notifications after 3 seconds
        document.addEventListener('DOMContentLoaded', function() {
            const alerts = document.querySelectorAll('.alert-success');
            alerts.forEach(alert => {
                if (alert.textContent.includes('registered successfully')) {
                    setTimeout(() => {
                        alert.style.transition = 'opacity 0.5s ease-out';
                        alert.style.opacity = '0';
                        setTimeout(() => {
                            if (alert && alert.parentNode) {
                                alert.remove();
                            }
                        }, 500);
                    }, 3000);
                }
            });
        });
    </script>
</body>
</html>
