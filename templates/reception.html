{% extends "base.html" %}

{% block title %}Reception - The Kids Clinic / Allergy and Asthma Center{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">
            <i data-feather="user-plus"></i>
            Reception Desk
        </h2>
    </div>
</div>

<div class="row">
    <!-- New Patient Registration -->
    <div class="col-lg-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h4><i data-feather="user-plus"></i> New Patient Registration</h4>
            </div>
            <div class="card-body">
                <form method="POST" id="newPatientForm">
                    <input type="hidden" name="action" value="new_patient">
                    
                    <div class="mb-3">
                        <label for="full_name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="date_of_birth" class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <textarea class="form-control" id="address" name="address" rows="2" required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="contact_number" class="form-label">Contact Number</label>
                        <input type="tel" class="form-control" id="contact_number" name="contact_number" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="gender" class="form-label">Gender</label>
                        <select class="form-select" id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="consultant_id" class="form-label">Assigned Consultant</label>
                        <select class="form-select" id="consultant_id" name="consultant_id" required>
                            <option value="">Select Consultant</option>
                            {% for consultant in consultants %}
                                <option value="{{ consultant.id }}">{{ consultant.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-success">
                        <i data-feather="save"></i>
                        Register Patient
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Returning Patient & Search -->
    <div class="col-lg-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h4><i data-feather="users"></i> Returning Patient</h4>
            </div>
            <div class="card-body">
                <form method="POST" id="returningPatientForm">
                    <input type="hidden" name="action" value="returning_patient">
                    
                    <div class="mb-3">
                        <label for="returning_reg_number" class="form-label">Registration Number</label>
                        <input type="text" class="form-control" id="returning_reg_number" 
                               name="registration_number" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="returning_consultant" class="form-label">Update Consultant (Optional)</label>
                        <select class="form-select" id="returning_consultant" name="consultant_id">
                            <option value="">Keep Current Consultant</option>
                            {% for consultant in consultants %}
                                <option value="{{ consultant.id }}">{{ consultant.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-success">
                        <i data-feather="check"></i>
                        Register Visit
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="loadPatientDetails()">
                        <i data-feather="search"></i>
                        Load Details
                    </button>
                </form>
            </div>
        </div>
        
        <!-- Patient Search -->
        <div class="card mt-4">
            <div class="card-header">
                <h4><i data-feather="search"></i> Patient Search</h4>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="search_query" class="form-label">Search by Name or Contact</label>
                    <input type="text" class="form-control" id="search_query" 
                           placeholder="Enter name or contact number">
                </div>
                
                <div id="searchResults" class="mt-3" style="display: none;">
                    <h6>Search Results:</h6>
                    <div id="searchResultsList" class="list-group"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Patient Details Modal -->
<div class="modal fade" id="patientDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Patient Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="patientDetailsContent">
                    <!-- Patient details will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
